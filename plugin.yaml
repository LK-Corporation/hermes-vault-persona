name: vault-persona
version: 0.3.3
description: |
  /persona <slug> + auto-load on mention (one-shot) + optional semantic routing
  via RAG hybrid dense+sparse + cross-encoder rerank (opt-in via
  HERMES_ROUTING_ENABLED=true) + telemetry hook for tool-driven persona/perfil
  loads. Mapping name_to_slug.json + aliases.yaml.
author: Brus
provides_hooks:
  - pre_llm_call
  - post_llm_call
  - on_session_reset
  - post_tool_call
